<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      .bg{fill:#08090d}.fm{font-family:'Fira Code',monospace}.fs{font-family:'Inter',sans-serif}
      .dot-grid{fill:#ffffff;opacity:0.03}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes spin{to{transform:rotate(360deg)}}
      .af{opacity:0;animation:fadeIn .3s ease forwards}

      /* Code panel typing */
      .c1{animation-delay:.6s}.c2{animation-delay:1.2s}.c3{animation-delay:1.8s}
      .c4{animation-delay:2.4s}.c5{animation-delay:3.0s}.c6{animation-delay:3.6s}
      .c7{animation-delay:4.2s}.c8{animation-delay:4.8s}

      /* Form field animations */
      @keyframes typeNameIn{0%,30%{width:0}38%,100%{width:50px}}
      .tn{animation:typeNameIn 12s linear infinite}
      @keyframes typeEmailBad{0%,42%{width:0}50%,58%{width:48px}58.1%,100%{width:0}}
      .te1{animation:typeEmailBad 12s linear infinite}
      @keyframes typeEmailGood{0%,58%{width:0}66%,100%{width:104px}}
      .te2{animation:typeEmailGood 12s linear infinite}

      /* Error bubble */
      @keyframes errPop{0%,50%{opacity:0;transform:translateY(-4px)}51%,64%{opacity:1;transform:translateY(0)}65%,100%{opacity:0;transform:translateY(-4px)}}
      .err-pop{animation:errPop 12s ease infinite}

      /* Button toggle */
      @keyframes btnOn{0%,65%{opacity:0}66%,85%{opacity:1}86%,100%{opacity:0}}
      @keyframes btnOff{0%,65%{opacity:1}66%,85%{opacity:0}86%,100%{opacity:1}}
      .btn-on{animation:btnOn 12s step-end infinite}
      .btn-off{animation:btnOff 12s step-end infinite}

      /* Toast */
      @keyframes toast{0%,78%{opacity:0;transform:translateY(-12px)}80%,90%{opacity:1;transform:translateY(0)}92%,100%{opacity:0;transform:translateY(-12px)}}
      .toast{animation:toast 12s ease infinite}

      /* State output phases */
      @keyframes phA{0%,42%{opacity:1}42.1%,100%{opacity:0}}
      @keyframes phB{0%,42%{opacity:0}42.1%,65%{opacity:1}65.1%,100%{opacity:0}}
      @keyframes phC{0%,65%{opacity:0}65.1%,100%{opacity:1}}
      .phA{animation:phA 12s step-end infinite}
      .phB{animation:phB 12s step-end infinite}
      .phC{animation:phC 12s step-end infinite}

      /* Flow arrow pulse */
      @keyframes flowPulse{0%,100%{stroke-opacity:.15}50%{stroke-opacity:.5}}
      .flow-arrow{animation:flowPulse 2.5s ease-in-out infinite}

      /* LED pulse */
      @keyframes ledPulse{0%,100%{opacity:.4}50%{opacity:1}}
      .led{animation:ledPulse 1.4s ease-in-out infinite}
    </style>
    <clipPath id="cn"><rect class="tn" x="0" y="0" width="0" height="18"/></clipPath>
    <clipPath id="ce1"><rect class="te1" x="0" y="0" width="0" height="18"/></clipPath>
    <clipPath id="ce2"><rect class="te2" x="0" y="0" width="0" height="18"/></clipPath>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ds"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity=".45"/></filter>
    <radialGradient id="g1" cx="28%" cy="60%" r="50%"><stop offset="0%" stop-color="#f59e0b" stop-opacity=".1"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="72%" cy="40%" r="45%"><stop offset="0%" stop-color="#6366f1" stop-opacity=".08"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/></radialGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="860" height="480" rx="16"/>
  <rect fill="url(#g1)" width="860" height="480" rx="16"/>
  <rect fill="url(#g2)" width="860" height="480" rx="16"/>
  <!-- Dot grid pattern -->
  <g opacity=".035">
    <circle cx="40" cy="40" r="1" fill="#fff"/><circle cx="80" cy="40" r="1" fill="#fff"/><circle cx="120" cy="40" r="1" fill="#fff"/><circle cx="160" cy="40" r="1" fill="#fff"/><circle cx="200" cy="40" r="1" fill="#fff"/><circle cx="240" cy="40" r="1" fill="#fff"/><circle cx="280" cy="40" r="1" fill="#fff"/>
    <circle cx="40" cy="80" r="1" fill="#fff"/><circle cx="80" cy="80" r="1" fill="#fff"/><circle cx="120" cy="80" r="1" fill="#fff"/><circle cx="160" cy="80" r="1" fill="#fff"/><circle cx="200" cy="80" r="1" fill="#fff"/><circle cx="240" cy="80" r="1" fill="#fff"/><circle cx="280" cy="80" r="1" fill="#fff"/>
    <circle cx="580" cy="400" r="1" fill="#fff"/><circle cx="620" cy="400" r="1" fill="#fff"/><circle cx="660" cy="400" r="1" fill="#fff"/><circle cx="700" cy="400" r="1" fill="#fff"/><circle cx="740" cy="400" r="1" fill="#fff"/><circle cx="780" cy="400" r="1" fill="#fff"/><circle cx="820" cy="400" r="1" fill="#fff"/>
    <circle cx="580" cy="440" r="1" fill="#fff"/><circle cx="620" cy="440" r="1" fill="#fff"/><circle cx="660" cy="440" r="1" fill="#fff"/><circle cx="700" cy="440" r="1" fill="#fff"/><circle cx="740" cy="440" r="1" fill="#fff"/><circle cx="780" cy="440" r="1" fill="#fff"/><circle cx="820" cy="440" r="1" fill="#fff"/>
  </g>

  <!-- Title -->
  <text class="fs" x="430" y="32" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="3" opacity=".7">FORM-READY · UNIVERSAL SCHEMA VALIDATION</text>

  <!-- ═══════ COLUMN 1: CODE EDITOR ═══════ -->
  <g transform="translate(24,52)" filter="url(#ds)">
    <rect width="260" height="380" rx="10" fill="#0d1117" stroke="#1e293b" stroke-width="1.5"/>
    <!-- Titlebar -->
    <rect width="260" height="28" rx="10" fill="#161b22"/>
    <rect y="20" width="260" height="8" fill="#161b22"/>
    <circle cx="16" cy="14" r="4.5" fill="#ff5f56"/><circle cx="30" cy="14" r="4.5" fill="#ffbd2e"/><circle cx="44" cy="14" r="4.5" fill="#27c93f"/>
    <text class="fs" x="130" y="18" fill="#8b949e" font-size="9" font-weight="600" text-anchor="middle">schema.ts</text>
    <line x1="0" y1="28" x2="260" y2="28" stroke="#1e293b" stroke-width="1"/>

    <!-- Code lines with sequential fade-in -->
    <g transform="translate(14,46)">
      <text class="fm af c1" font-size="11"><tspan fill="#c084fc">import</tspan><tspan fill="#c9d1d9"> { z } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#fbbf24"> 'zod'</tspan></text>
      <text class="fm af c2" y="20" font-size="11"><tspan fill="#c084fc">import</tspan><tspan fill="#c9d1d9"> { useForm } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#fbbf24"> 'form-ready/react'</tspan></text>
      <text class="fm af c3" y="48" font-size="11"><tspan fill="#c084fc">const</tspan><tspan fill="#58a6ff"> schema</tspan><tspan fill="#c9d1d9"> = z.</tspan><tspan fill="#22d3ee">object</tspan><tspan fill="#c9d1d9">({</tspan></text>
      <text class="fm af c4" y="66" font-size="11"><tspan fill="#c9d1d9">  name: z.</tspan><tspan fill="#22d3ee">string</tspan><tspan fill="#c9d1d9">().</tspan><tspan fill="#22d3ee">min</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#fbbf24">2</tspan><tspan fill="#c9d1d9">),</tspan></text>
      <text class="fm af c5" y="84" font-size="11"><tspan fill="#c9d1d9">  email: z.</tspan><tspan fill="#22d3ee">string</tspan><tspan fill="#c9d1d9">().</tspan><tspan fill="#22d3ee">email</tspan><tspan fill="#c9d1d9">(),</tspan></text>
      <text class="fm af c6" y="102" font-size="11"><tspan fill="#c9d1d9">})</tspan></text>
      <text class="fm af c7" y="130" font-size="11"><tspan fill="#c084fc">const</tspan><tspan fill="#c9d1d9"> { </tspan><tspan fill="#58a6ff">values</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#58a6ff">isValid</tspan><tspan fill="#c9d1d9">,</tspan></text>
      <text class="fm af c7" y="148" font-size="11"><tspan fill="#c9d1d9">  </tspan><tspan fill="#58a6ff">errors</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#58a6ff">handleChange</tspan><tspan fill="#c9d1d9">,</tspan></text>
      <text class="fm af c7" y="166" font-size="11"><tspan fill="#c9d1d9">  </tspan><tspan fill="#58a6ff">handleSubmit</tspan></text>
      <text class="fm af c8" y="184" font-size="11"><tspan fill="#c9d1d9">} = </tspan><tspan fill="#22d3ee">useForm</tspan><tspan fill="#c9d1d9">({ schema })</tspan></text>
    </g>

    <!-- Line numbers -->
    <g transform="translate(0,46)" opacity=".25">
      <text class="fm" x="4" font-size="9" fill="#8b949e">1</text>
      <text class="fm" x="4" y="20" font-size="9" fill="#8b949e">2</text>
      <text class="fm" x="4" y="48" font-size="9" fill="#8b949e">4</text>
      <text class="fm" x="4" y="66" font-size="9" fill="#8b949e">5</text>
      <text class="fm" x="4" y="84" font-size="9" fill="#8b949e">6</text>
      <text class="fm" x="4" y="102" font-size="9" fill="#8b949e">7</text>
      <text class="fm" x="4" y="130" font-size="9" fill="#8b949e">9</text>
      <text class="fm" x="4" y="148" font-size="9" fill="#8b949e">10</text>
      <text class="fm" x="4" y="166" font-size="9" fill="#8b949e">11</text>
      <text class="fm" x="4" y="184" font-size="9" fill="#8b949e">12</text>
    </g>

    <!-- Bottom terminal snippet -->
    <g transform="translate(14,270)">
      <line x1="-14" y1="-8" x2="246" y2="-8" stroke="#1e293b" stroke-width="1"/>
      <text class="fs" x="0" y="6" fill="#52525b" font-size="8" font-weight="700" letter-spacing="1">TERMINAL</text>
      <text class="fm" y="26" font-size="10"><tspan fill="#f59e0b" font-weight="700">❯</tspan><tspan fill="#c9d1d9"> npm i form-ready zod</tspan></text>
      <text class="fm af c6" y="44" font-size="10"><tspan fill="#57ab5a" font-weight="700">✔</tspan><tspan fill="#8b949e"> added 2 packages (0 deps)</tspan></text>
      <text class="fm af c7" y="62" font-size="10"><tspan fill="#f59e0b" font-weight="700">❯</tspan><tspan fill="#c9d1d9"> npm run dev</tspan></text>
      <text class="fm af c8" y="80" font-size="10"><tspan fill="#39c5cf">Vite ready at</tspan><tspan fill="#58a6ff"> localhost:5173</tspan></text>
    </g>
  </g>

  <!-- ═══════ FLOW ARROW 1 ═══════ -->
  <path class="flow-arrow" d="M290,242 C320,242 310,242 335,242" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="335,237 345,242 335,247" fill="#f59e0b" opacity=".4"/>
  <text class="fs" x="318" y="232" fill="#f59e0b" font-size="7" font-weight="700" text-anchor="middle" opacity=".5">SCHEMA</text>

  <!-- ═══════ COLUMN 2: LIVE FORM UI ═══════ -->
  <g transform="translate(350,72)" filter="url(#ds)">
    <rect width="220" height="340" rx="14" fill="#111318" stroke="rgba(245,158,11,0.2)" stroke-width="1.5"/>
    <!-- Header gradient bar -->
    <rect width="220" height="44" rx="14" fill="#1c1510"/>
    <rect y="30" width="220" height="14" fill="#1c1510"/>
    <text class="fs" x="110" y="30" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">Create Account</text>

    <!-- Name Field -->
    <g transform="translate(18,62)">
      <text class="fs" fill="#71717a" font-size="8" font-weight="700" letter-spacing=".5">FULL NAME</text>
      <rect y="10" width="184" height="30" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
      <text class="fs" x="10" y="30" fill="#52525b" font-size="10">Your full name</text>
      <g clip-path="url(#cn)"><text class="fs" x="10" y="30" fill="#e4e4e7" font-size="10">Alex Johnson</text></g>
    </g>

    <!-- Email Field -->
    <g transform="translate(18,120)">
      <text class="fs" fill="#71717a" font-size="8" font-weight="700" letter-spacing=".5">EMAIL ADDRESS</text>
      <rect y="10" width="184" height="30" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
      <text class="fs" x="10" y="30" fill="#52525b" font-size="10">you@example.com</text>
      <!-- Phase 1: bad email -->
      <g clip-path="url(#ce1)"><text class="fs" x="10" y="30" fill="#e4e4e7" font-size="10">john@</text></g>
      <!-- Phase 2: good email -->
      <g clip-path="url(#ce2)"><text class="fs" x="10" y="30" fill="#e4e4e7" font-size="10">john@doe.com</text></g>
    </g>

    <!-- Validation Error Bubble -->
    <g class="err-pop" transform="translate(18,164)">
      <rect width="184" height="22" rx="4" fill="#1c0a0a" stroke="#7f1d1d" stroke-width="1"/>
      <circle cx="12" cy="11" r="3" fill="#ef4444"/>
      <text class="fs" x="22" y="14" fill="#fca5a5" font-size="8" font-weight="600">Invalid email address</text>
    </g>

    <!-- Password Field (static) -->
    <g transform="translate(18,196)">
      <text class="fs" fill="#71717a" font-size="8" font-weight="700" letter-spacing=".5">PASSWORD</text>
      <rect y="10" width="184" height="30" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
      <text class="fs" x="10" y="30" fill="#52525b" font-size="10">••••••••</text>
    </g>

    <!-- Disabled Submit -->
    <g class="btn-off" transform="translate(18,260)">
      <rect width="184" height="34" rx="7" fill="#1c1c1e"/>
      <text class="fs" x="92" y="21" fill="#52525b" font-size="10" font-weight="700" text-anchor="middle">Submit</text>
    </g>
    <!-- Enabled Submit -->
    <g class="btn-on" transform="translate(18,260)">
      <rect width="184" height="34" rx="7" fill="#f59e0b"/>
      <text class="fs" x="92" y="21" fill="#09090b" font-size="10" font-weight="700" text-anchor="middle">Submit</text>
    </g>

    <!-- Success Toast -->
    <g class="toast" transform="translate(18,302)">
      <rect width="184" height="26" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1"/>
      <text class="fs" x="92" y="17" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">✔ Submitted Successfully!</text>
    </g>
  </g>

  <!-- ═══════ FLOW ARROW 2 ═══════ -->
  <path class="flow-arrow" d="M575,242 C605,242 595,242 620,242" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" style="animation-delay:.8s"/>
  <polygon points="620,237 630,242 620,247" fill="#6366f1" opacity=".4"/>
  <text class="fs" x="603" y="232" fill="#6366f1" font-size="7" font-weight="700" text-anchor="middle" opacity=".5">STATE</text>

  <!-- ═══════ COLUMN 3: LIVE STATE OUTPUT ═══════ -->
  <g transform="translate(635,72)" filter="url(#ds)">
    <rect width="200" height="340" rx="10" fill="#0d1117" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="200" height="28" rx="10" fill="#161b22"/>
    <rect y="20" width="200" height="8" fill="#161b22"/>
    <text class="fs" x="100" y="18" fill="#8b949e" font-size="9" font-weight="600" text-anchor="middle">State Inspector</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#1e293b" stroke-width="1"/>

    <!-- Active listener LED -->
    <g transform="translate(14,42)">
      <circle class="led" cx="5" cy="5" r="4" fill="#3b82f6" filter="url(#glow)"/>
      <text class="fs" x="16" y="8" fill="#93c5fd" font-size="9" font-weight="600">useForm() active</text>
    </g>

    <line x1="14" y1="58" x2="186" y2="58" stroke="#1e293b" stroke-width="1"/>

    <!-- Phase A: Initial empty state -->
    <g class="phA" transform="translate(14,70)">
      <text class="fm" font-size="10" fill="#8b949e">isValid: <tspan fill="#71717a" font-weight="700">false</tspan></text>
      <text class="fm" y="20" font-size="10" fill="#8b949e">errors: <tspan fill="#71717a" font-weight="700">[]</tspan></text>
      <text class="fm" y="48" font-size="10" fill="#52525b">fields: {</text>
      <text class="fm" y="64" font-size="10" fill="#52525b">  name: <tspan fill="#71717a">""</tspan></text>
      <text class="fm" y="80" font-size="10" fill="#52525b">  email: <tspan fill="#71717a">""</tspan></text>
      <text class="fm" y="96" font-size="10" fill="#52525b">}</text>
      <rect y="120" width="172" height="22" rx="4" fill="#1a1a2e" stroke="#27272a" stroke-width="1"/>
      <text class="fs" x="86" y="134" fill="#52525b" font-size="8" font-weight="700" text-anchor="middle">WAITING FOR INPUT...</text>
    </g>

    <!-- Phase B: Email error state -->
    <g class="phB" transform="translate(14,70)">
      <text class="fm" font-size="10" fill="#8b949e">isValid: <tspan fill="#f87171" font-weight="700">false</tspan></text>
      <text class="fm" y="20" font-size="10" fill="#8b949e">errors: <tspan fill="#ef4444" font-weight="700">[1]</tspan></text>
      <text class="fm" y="48" font-size="10" fill="#52525b">fields: {</text>
      <text class="fm" y="64" font-size="10" fill="#52525b">  name: <tspan fill="#34d399">"Alex"</tspan></text>
      <text class="fm" y="80" font-size="10" fill="#52525b">  email: <tspan fill="#f87171">"john@"</tspan></text>
      <text class="fm" y="96" font-size="10" fill="#52525b">}</text>
      <rect y="120" width="172" height="22" rx="4" fill="#2a0a0a" stroke="#7f1d1d" stroke-width="1"/>
      <circle cx="12" cy="131" r="3" fill="#ef4444"/>
      <text class="fs" x="22" y="134" fill="#fca5a5" font-size="8" font-weight="600">Invalid email address</text>
    </g>

    <!-- Phase C: All valid state -->
    <g class="phC" transform="translate(14,70)">
      <text class="fm" font-size="10" fill="#8b949e">isValid: <tspan fill="#34d399" font-weight="700">true</tspan></text>
      <text class="fm" y="20" font-size="10" fill="#8b949e">errors: <tspan fill="#34d399" font-weight="700">[]</tspan></text>
      <text class="fm" y="48" font-size="10" fill="#52525b">fields: {</text>
      <text class="fm" y="64" font-size="10" fill="#52525b">  name: <tspan fill="#34d399">"Alex"</tspan></text>
      <text class="fm" y="80" font-size="10" fill="#52525b">  email: <tspan fill="#34d399">"john@doe.com"</tspan></text>
      <text class="fm" y="96" font-size="10" fill="#52525b">}</text>
      <rect y="120" width="172" height="22" rx="4" fill="#052e16" stroke="#10b981" stroke-width="1"/>
      <circle cx="12" cy="131" r="3" fill="#10b981" filter="url(#glow)"/>
      <text class="fs" x="22" y="134" fill="#34d399" font-size="8" font-weight="700">ALL VALIDATIONS PASSED</text>
    </g>

    <!-- Feature badges bottom -->
    <g transform="translate(14,270)">
      <line x1="0" y1="-8" x2="172" y2="-8" stroke="#1e293b" stroke-width="1"/>
      <rect width="78" height="18" rx="4" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
      <text class="fs" x="6" y="12" fill="#a5b4fc" font-size="7" font-weight="700">⚡ ZOD SCHEMAS</text>
      <rect x="84" width="88" height="18" rx="4" fill="#1a2e05" stroke="#3f6212" stroke-width="1"/>
      <text class="fs" x="90" y="12" fill="#bef264" font-size="7" font-weight="700">🧩 REACT + VANILLA</text>
      <rect y="24" width="80" height="18" rx="4" fill="#2a1507" stroke="#92400e" stroke-width="1"/>
      <text class="fs" x="6" y="36" fill="#fbbf24" font-size="7" font-weight="700">🔒 TYPESCRIPT</text>
      <rect x="86" y="24" width="86" height="18" rx="4" fill="#0a1929" stroke="#1e40af" stroke-width="1"/>
      <text class="fs" x="92" y="36" fill="#93c5fd" font-size="7" font-weight="700">♿ ARIA BUILT-IN</text>
    </g>
  </g>

  <!-- Bottom Label -->
  <text class="fs" x="430" y="464" fill="#3f3f46" font-size="9" font-weight="600" text-anchor="middle" letter-spacing="1">SCHEMA DEFINITION → LIVE FORM → REAL-TIME VALIDATION STATE</text>
</svg>
